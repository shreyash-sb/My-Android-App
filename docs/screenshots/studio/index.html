<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Expense Tracker Screenshot Studio</title>
  <style>
    :root {
      --primary: #17313e;
      --primary-dark: #0e222c;
      --secondary: #ff7a59;
      --tertiary: #3aa889;
      --warning: #cf5b3d;
      --info: #3458d0;
      --background: #f7f2ea;
      --surface: #ffffff;
      --surface-alt: #f0e8da;
      --divider: #d9d1c6;
      --text: #1f2529;
      --muted: #66747b;
      --muted-2: #8a949a;
      --white: #fffdf8;
      --success: #2e8b57;
      --hero: linear-gradient(145deg, #17313e 0%, #315568 45%, #ff7a59 100%);
      --shadow: 0 12px 24px rgba(23, 49, 62, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 430px;
      min-height: 932px;
      background: var(--background);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .screen {
      width: 430px;
      height: 932px;
      background: var(--background);
      overflow: hidden;
      position: relative;
    }

    .screen.splash {
      background:
        radial-gradient(circle at 82% 10%, rgba(255,255,255,0.18) 0, rgba(255,255,255,0) 32%),
        radial-gradient(circle at 8% 92%, rgba(255,255,255,0.12) 0, rgba(255,255,255,0) 28%),
        linear-gradient(160deg, #17313e 0%, #294454 48%, #ff7a59 100%);
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .statusbar.inverse {
      color: rgba(255,255,255,0.92);
    }

    .status-icons {
      display: flex;
      gap: 8px;
      font-weight: 600;
      font-size: 12px;
      align-items: center;
    }

    .content {
      padding: 12px 20px 30px;
      height: calc(100% - 42px);
      overflow: hidden;
    }

    .scroll {
      height: 100%;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toolbar.center .toolbar-title {
      flex: 1;
      text-align: center;
      margin-right: 42px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      border: none;
    }

    .toolbar-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }

    .hero {
      background: var(--hero);
      color: var(--white);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero.large {
      padding: 24px;
      min-height: 170px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.18);
      color: var(--white);
    }

    .logo-pill {
      width: 74px;
      height: 74px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.18);
      color: var(--white);
      font-size: 34px;
      font-weight: 800;
      margin-top: 24px;
    }

    .splash-logo {
      width: 108px;
      height: 108px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.18);
      color: var(--white);
      font-size: 48px;
      font-weight: 800;
      margin: 24px auto 0;
      box-shadow: 0 12px 28px rgba(0,0,0,0.14);
    }

    .hero h1,
    .hero h2,
    .hero h3,
    .hero p {
      margin: 0;
    }

    .hero h1 {
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      margin-top: 24px;
    }

    .hero h2 {
      font-size: 24px;
      font-weight: 900;
      margin-top: 18px;
    }

    .hero .sub {
      margin-top: 8px;
      color: rgba(255,255,255,0.86);
      font-size: 14px;
      line-height: 1.45;
    }

    .hero .meta {
      margin-top: 16px;
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      font-weight: 700;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 22px;
    }

    .hero-mini {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 14px 16px;
    }

    .hero-mini .label {
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      font-weight: 700;
    }

    .hero-mini .value {
      margin-top: 6px;
      color: var(--white);
      font-size: 20px;
      font-weight: 900;
    }

    .progress {
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      overflow: hidden;
      margin-top: 16px;
    }

    .progress > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
    }

    .section-title {
      margin: 24px 0 12px;
      font-size: 20px;
      font-weight: 900;
      color: var(--text);
    }

    .section-subtitle {
      margin-top: -4px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--divider);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card.alt {
      background: var(--surface-alt);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .metric-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-bottom: 14px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.25;
      min-height: 34px;
      font-weight: 700;
    }

    .metric-value {
      margin-top: 8px;
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      line-height: 1.15;
    }

    .metric-value.success {
      color: var(--success);
    }

    .metric-value.info {
      color: var(--info);
    }

    .metric-value.warning {
      color: var(--warning);
    }

    .field,
    .select,
    .textarea {
      border: 1px solid var(--divider);
      border-radius: 18px;
      background: #fff;
      padding: 12px 14px 12px;
      position: relative;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field-value {
      margin-top: 5px;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
    }

    .field-value.muted {
      color: var(--muted);
      font-weight: 600;
    }

    .textarea .field-value {
      min-height: 48px;
      line-height: 1.35;
    }

    .field-trailing {
      position: absolute;
      right: 14px;
      top: 17px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 900;
    }

    .button {
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      font-size: 15px;
      font-weight: 800;
      border: none;
    }

    .button.outline {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--divider);
    }

    .button.secondary {
      background: var(--secondary);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .muted-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .text-link {
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
      text-align: right;
      margin-top: 10px;
    }

    .center-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .center-row strong {
      color: var(--primary);
    }

    .list-item {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 14px;
      align-items: center;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--divider);
      border-radius: 20px;
      padding: 14px;
    }

    .badge {
      width: 52px;
      height: 52px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: 900;
    }

    .item-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(23, 49, 62, 0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip.active {
      background: var(--primary);
      color: var(--white);
    }

    .chip.success {
      background: rgba(58, 168, 137, 0.14);
      color: var(--success);
    }

    .chip.warn {
      background: rgba(255, 122, 89, 0.16);
      color: var(--warning);
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow: hidden;
      margin-top: 10px;
    }

    .item-amount {
      font-size: 19px;
      font-weight: 900;
      text-align: right;
    }

    .item-amount.debit {
      color: var(--warning);
    }

    .item-amount.credit {
      color: var(--success);
    }

    .fab {
      position: absolute;
      right: 20px;
      bottom: 24px;
      min-width: 130px;
      height: 52px;
      border-radius: 18px;
      background: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 16px 24px rgba(23, 49, 62, 0.18);
    }

    .pill-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      overflow: hidden;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .stat small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .progress-line {
      height: 8px;
      border-radius: 999px;
      background: var(--surface-alt);
      overflow: hidden;
      margin-top: 14px;
    }

    .progress-line > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: var(--secondary);
    }

    .kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .big-number {
      margin-top: 6px;
      font-size: 31px;
      line-height: 1;
      font-weight: 900;
      color: var(--text);
    }

    .pie {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      margin: 16px auto 0;
      background: conic-gradient(
        var(--primary) 0 38%,
        var(--secondary) 38% 62%,
        var(--tertiary) 62% 79%,
        #e7b84e 79% 91%,
        #a56fc8 91% 100%
      );
      position: relative;
    }

    .pie::after {
      content: "";
      position: absolute;
      inset: 34px;
      background: var(--surface);
      border-radius: 50%;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .legend-left {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .bars {
      display: flex;
      align-items: end;
      gap: 12px;
      height: 180px;
      margin-top: 18px;
    }

    .bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: end;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .bar > span {
      width: 100%;
      max-width: 32px;
      border-radius: 14px 14px 8px 8px;
      background: linear-gradient(180deg, rgba(255,122,89,0.95), rgba(23,49,62,0.95));
    }

    .drawer-wrap {
      position: relative;
      height: 100%;
      overflow: hidden;
    }

    .drawer-overlay {
      position: absolute;
      inset: 0;
      background: rgba(23, 49, 62, 0.2);
    }

    .drawer-panel {
      position: absolute;
      inset: 0 auto 0 0;
      width: 304px;
      background: var(--surface);
      border-right: 1px solid var(--divider);
      padding: 18px;
      box-shadow: 20px 0 24px rgba(23,49,62,0.10);
    }

    .drawer-card {
      background: var(--surface-alt);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
    }

    .drawer-avatar {
      width: 64px;
      height: 64px;
      border-radius: 24px;
      background: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      font-size: 24px;
      font-weight: 900;
    }

    .drawer-title {
      margin-top: 18px;
      font-size: 16px;
      font-weight: 900;
    }

    .drawer-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .drawer-nav-title {
      margin-top: 18px;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
    }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      height: 42px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }

    .drawer-icon {
      width: 30px;
      text-align: center;
      color: var(--primary);
    }

    .divider {
      height: 1px;
      background: var(--divider);
      margin: 10px 0;
    }

    .logout {
      color: var(--warning);
    }

    .switch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding: 10px 0 4px;
    }

    .switch {
      width: 52px;
      height: 32px;
      border-radius: 16px;
      background: rgba(58, 168, 137, 0.22);
      padding: 3px;
      display: flex;
      justify-content: end;
    }

    .switch > span {
      width: 26px;
      height: 26px;
      border-radius: 13px;
      background: var(--success);
    }

    .loading-card {
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 60px;
      background: rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 18px;
      color: rgba(255,255,255,0.84);
      text-align: center;
    }

    .loading-bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
    }

    .loading-bar span {
      display: block;
      width: 52%;
      height: 100%;
      background: rgba(255,255,255,0.9);
      border-radius: 999px;
    }

    .footer-version {
      position: absolute;
      bottom: 132px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.46);
      font-size: 11px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const screen = new URLSearchParams(window.location.search).get("screen") || "dashboard";

    function money(value) {
      return `Rs ${value}`;
    }

    function statusbar(inverse = false) {
      return `
        <div class="statusbar ${inverse ? "inverse" : ""}">
          <div>2:20</div>
          <div class="status-icons"><span>4G</span><span>●●●</span><span>78%</span></div>
        </div>
      `;
    }

    function toolbar(title, left = "←", center = true) {
      return `
        <div class="toolbar ${center ? "center" : ""}">
          <div class="icon-btn">${left}</div>
          <div class="toolbar-title">${title}</div>
          <div class="icon-btn"></div>
        </div>
      `;
    }

    function menuToolbar() {
      return `
        <div class="toolbar">
          <div class="icon-btn" style="background: var(--surface-alt)">☰</div>
          <div style="flex:1; margin-left: 14px;">
            <div style="font-size: 26px; font-weight: 900; color: var(--text);">Smart Expense Tracker</div>
            <div style="margin-top: 2px; font-size: 16px; font-weight: 700; color: var(--muted);">Apr 2026 snapshot</div>
          </div>
        </div>
      `;
    }

    function field(label, value, trailing = "") {
      return `
        <div class="field">
          <div class="field-label">${label}</div>
          <div class="field-value">${value}</div>
          ${trailing ? `<div class="field-trailing">${trailing}</div>` : ""}
        </div>
      `;
    }

    function textarea(label, value) {
      return `
        <div class="textarea field">
          <div class="field-label">${label}</div>
          <div class="field-value">${value}</div>
        </div>
      `;
    }

    function metric(label, value, colorClass = "", dot = "#17313e") {
      return `
        <div class="card">
          <div class="metric-dot" style="background:${dot}"></div>
          <div class="metric-label">${label}</div>
          <div class="metric-value ${colorClass}">${value}</div>
        </div>
      `;
    }

    function recentItem(letter, color, title, meta, type, amount, kind) {
      return `
        <div class="list-item">
          <div class="badge" style="background:${color}">${letter}</div>
          <div>
            <div class="item-title">${title}</div>
            <div class="item-meta">${meta}</div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:end; gap:8px;">
            <div class="chip ${kind === "credit" ? "success" : "warn"}">${type}</div>
            <div class="item-amount ${kind}">${amount}</div>
          </div>
        </div>
      `;
    }

    function simpleCard(title, body) {
      return `
        <div class="card">
          <div style="font-size:17px; font-weight:800; color:var(--text);">${title}</div>
          <div style="margin-top:10px; font-size:14px; line-height:1.45; color:var(--muted);">${body}</div>
        </div>
      `;
    }

    const screens = {
      splash: `
        <div class="screen splash">
          ${statusbar(true)}
          <div class="content" style="position:relative; color:var(--white);">
            <div style="height:100%; display:flex; flex-direction:column; justify-content:center; text-align:center; padding:0 18px;">
              <div class="hero-tag" style="margin:0 auto;">Private Firebase sync</div>
              <div class="splash-logo">₹</div>
              <div style="margin-top:28px; font-size:34px; line-height:1.08; font-weight:900;">Smart Expense Tracker</div>
              <div style="margin-top:10px; font-size:15px; line-height:1.45; color:rgba(255,255,255,0.86);">Track every rupee with calm, clear daily control.</div>
              <div style="margin-top:8px; font-size:13px; color:rgba(255,255,255,0.74); font-weight:700;">Budget planning, fast entries, and private sync.</div>
            </div>
            <div class="footer-version">Version 1.0</div>
            <div class="loading-card">
              <div class="loading-bar"><span></span></div>
              <div style="margin-top:14px; font-size:13px; font-weight:700;">Loading your workspace...</div>
            </div>
          </div>
        </div>
      `,
      login: `
        <div class="screen">
          ${statusbar()}
          <div class="content">
            <div class="scroll">
              <div class="hero large">
                <div class="logo-pill">₹</div>
                <h1>Welcome back</h1>
                <p class="sub">Sign in to continue with your expenses and budget.</p>
              </div>
              <div class="card" style="margin-top:16px;">
                <div style="font-size:20px; font-weight:800;">Sign in</div>
                <div class="stack" style="margin-top:16px;">
                  ${field("Email or mobile number", "shreyash@gmail.com")}
                  ${field("Password", "••••••••••", "◔")}
                </div>
                <div class="text-link">Reset password</div>
                <div class="button" style="margin-top:18px;">Login</div>
                <div class="center-row">Need an account? <strong>Create account</strong></div>
              </div>
            </div>
          </div>
        </div>
      `,
      register: `
        <div class="screen">
          ${statusbar()}
          <div class="content">
